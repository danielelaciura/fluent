<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>MeetFluent — Permissions</title>
		<style>
			@import "@fontsource-variable/nunito-sans";
			* { margin: 0; padding: 0; box-sizing: border-box; }
			body {
				font-family: "Nunito Sans Variable", "Nunito Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				background: #f8fafc;
				color: #1e293b;
			}
			.card {
				background: #fff;
				border: 1px solid #e2e8f0;
				border-radius: 12px;
				padding: 32px;
				max-width: 420px;
				text-align: center;
			}
			h1 { font-size: 20px; margin-bottom: 8px; }
			p { font-size: 14px; color: #64748b; margin-bottom: 20px; line-height: 1.5; }
			.btn {
				padding: 12px 24px;
				border: none;
				border-radius: 8px;
				font-size: 14px;
				font-weight: 600;
				cursor: pointer;
				background: #1b6b93;
				color: #fff;
				transition: background 0.15s;
			}
			.btn:hover { background: #155a7d; }
			.btn:disabled { opacity: 0.6; cursor: not-allowed; }
			.status {
				margin-top: 16px;
				font-size: 13px;
				font-weight: 500;
			}
			.status.granted { color: #16a34a; }
			.status.denied { color: #ef4444; }
		</style>
	</head>
	<body>
		<div class="card">
			<h1>Microphone Access</h1>
			<p>MeetFluent needs microphone access to record your voice during meetings. Click the button below and allow access when prompted.</p>
			<button id="grant-btn" class="btn" type="button">Allow Microphone</button>
			<div id="status" class="status"></div>
		</div>
		<script type="module" src="./permissions.ts"></script>
	</body>
</html>
