<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>MeetFluent</title>
		<link rel="stylesheet" href="./style.css" />
	</head>
	<body>
		<div class="container">
			<h1 class="title">MeetFluent</h1>
			<p class="subtitle">AI English Coach</p>

			<!-- Auth section (shown when logged out) -->
			<div id="auth-section" class="auth-section" hidden>
				<button id="login-btn" class="btn-login" type="button">Dev Login</button>
			</div>

			<!-- User header (shown when logged in) -->
			<div id="user-header" class="user-header" hidden>
				<span id="user-name" class="user-name"></span>
				<button id="logout-btn" class="btn-logout" type="button">Sign out</button>
			</div>

			<div id="meet-indicator" class="meet-indicator" hidden>On Google Meet</div>

			<!-- Status area (changes per state) -->
			<div id="status" class="status idle">Idle</div>

			<!-- Error message -->
			<div id="error-msg" class="error-msg" hidden></div>

			<!-- Report link -->
			<a id="report-link" class="report-link" href="#" target="_blank" hidden>View report</a>

			<!-- Main action button -->
			<button id="toggle-btn" class="btn idle" type="button" hidden>Start Recording</button>

			<!-- Reset button (for processing/error states) -->
			<button id="reset-btn" class="btn-reset" type="button" hidden>New recording</button>
		</div>
		<script type="module" src="./main.ts"></script>
	</body>
</html>
